      .subtitle { fill: #aebdb5; font: 20px "Malgun Gothic", "Noto Sans KR", sans-serif; text-anchor: middle; }
      .edge { fill: none; stroke: #91a69b; stroke-width: 3; marker-end: url(#arrow); }
      .edge-dynamic { fill: none; stroke: #e2bd73; stroke-width: 3; stroke-dasharray: 9 7; marker-end: url(#arrow-dynamic); }
      .edge-inherit { fill: none; stroke: #7eb5d6; stroke-width: 3; stroke-dasharray: 3 7; marker-end: url(#arrow-inherit); }
      .edge-label { fill: #cbd7d0; font: 17px "Malgun Gothic", "Noto Sans KR", sans-serif; text-anchor: middle; }
      .legend { fill: #cbd7d0; font: 17px "Malgun Gothic", "Noto Sans KR", sans-serif; }
    </style>
