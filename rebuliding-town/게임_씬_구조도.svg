      .head { fill: #d7e7d3; }
      .head-core { fill: #f1d9a7; }
      .head-unused { fill: #d1d1d1; }
      .title { fill: #101514; font: 700 24px "Malgun Gothic", "Noto Sans KR", sans-serif; text-anchor: middle; }
